name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I find myself always having to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd like it to work (CLI interface, behavior, etc.)
      placeholder: "`dotctl foo --bar` would..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't work.

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Core (sync, bootstrap, context)
        - Plugin system
        - CLI / UX
        - Documentation
        - Other
    validations:
      required: true
