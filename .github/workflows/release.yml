name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-X github.com/gh-jsoares/dotctl/cmd.version=${VERSION} -X github.com/gh-jsoares/dotctl/cmd.commit=${COMMIT}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dotctl_darwin_arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dotctl_darwin_amd64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dotctl_darwin_arm64
            dist/dotctl_darwin_amd64
