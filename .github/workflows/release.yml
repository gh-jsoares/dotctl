name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${GITHUB_REF_NAME}
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update changelog for ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:main

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-X github.com/gh-jsoares/dotctl/cmd.version=${VERSION} -X github.com/gh-jsoares/dotctl/cmd.commit=${COMMIT}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dotctl_darwin_arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dotctl_darwin_amd64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dotctl_darwin_arm64
            dist/dotctl_darwin_amd64

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_ARM64=$(shasum -a 256 dist/dotctl_darwin_arm64 | cut -d' ' -f1)
          SHA_AMD64=$(shasum -a 256 dist/dotctl_darwin_amd64 | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/gh-jsoares/homebrew-tap.git tap
          cd tap

          cat > Formula/dotctl.rb << EOF
          class Dotctl < Formula
            desc "Developer environment orchestrator for macOS"
            homepage "https://github.com/gh-jsoares/dotctl"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/gh-jsoares/dotctl/releases/download/v#{version}/dotctl_darwin_arm64"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/gh-jsoares/dotctl/releases/download/v#{version}/dotctl_darwin_amd64"
                sha256 "${SHA_AMD64}"
              end
            end

            def install
              binary = Hardware::CPU.arm? ? "dotctl_darwin_arm64" : "dotctl_darwin_amd64"
              bin.install binary => "dotctl"
            end

            test do
              assert_match "dotctl", shell_output("#{bin}/dotctl version")
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/dotctl.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dotctl.rb
          git commit -m "chore: update dotctl to v${VERSION}"
          git push
