# dotctl configuration
# Place at: ~/.config/dotctl/config.toml

machine = "personal-mbp"

[dotfiles]
path = "~/dotfilesv2/dotfiles"
remote = "git@personal.github.com:youruser/dotfiles.git"

[dotctl]
path = "~/dotfilesv2/dotctl"
remote = "git@personal.github.com:youruser/dotctl.git"
repo_owner = "youruser"
repo_name = "dotctl"

# Context-guarded commands
# These generate shell wrappers that warn when run outside the specified context.

[[guards]]
command = "awscreds"
context = "work"
message = "Running awscreds will write to your current context's AWS/kube/docker config."

[[guards]]
command = "kubectl"
context = "work"
message = "kubectl is operating on the active KUBECONFIG for your current context."
